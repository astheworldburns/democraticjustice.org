backend:
  name: git-gateway
  branch: main
  identity_url: /api/cms/identity
  gateway_url: /api/cms/git

site_url: https://democraticjustice.org
display_url: https://democraticjustice.org
media_folder: src/assets/images/uploads
public_folder: /assets/images/uploads

singletons:
  - name: site_settings
    label: Site Settings
    icon: settings
    description: Core brand copy for the masthead, footer, and default metadata.
    file: src/_data/siteSettings.json
    fields:
      - label: Site Title
        name: site_title
        widget: string
      - label: Tagline
        name: tagline
        widget: string
      - label: Mission Statement
        name: mission_statement
        widget: text
      - label: Footer Description
        name: footer_description
        widget: text
      - label: Standards Tagline
        name: standards_tagline
        widget: string
      - label: Meta Description / Open Graph Description
        name: meta_description
        widget: text

collections:
  - name: authors
    label: Authors
    label_singular: Author
    icon: group
    description: Reporter and editor bylines used throughout the publication.
    folder: src/content/authors
    identifier_field: name
    slug: "{{slug}}"
    summary: "{{name}} - {{role}}"
    preview_path: "/staff/{{slug}}/"
    fields:
      - label: Full Name
        name: name
        widget: string
      - label: Role
        name: role
        widget: string
      - label: Short Bio
        name: short_bio
        widget: text
      - label: Biography
        name: bio
        widget: text
      - label: Email
        name: email
        widget: string
        required: false
      - label: Headshot
        name: headshot
        widget: image
        required: false
      - label: Bluesky
        name: bluesky
        widget: string
        required: false
      - label: Twitter / X
        name: twitter
        widget: string
        required: false
  - name: articles
    label: Articles
    label_singular: Article
    icon: article
    description: Longform reporting. Every published piece requires a completed Proof Card.
    folder: src/content/articles
    slug: "{{slug}}"
    summary: "{{title}} - {{date | date('DD MMM YYYY')}}"
    preview_path: "/articles/{{slug}}/"
    preview_path_date_field: date
    thumbnail: featured_image
    sortable_fields:
      - title
      - date
      - author
    fields:
      - label: Kicker
        name: kicker
        widget: string
        required: false
      - label: Headline
        name: title
        widget: string
      - label: Lede
        name: description
        widget: text
      - label: Author
        name: author
        widget: relation
        collection: authors
        search_fields:
          - name
          - role
        value_field: "{{slug}}"
        display_fields:
          - name
      - label: Publication Date
        name: date
        widget: datetime
      - label: Editorial Categories
        name: tags
        widget: list
        default:
          - article
      - label: Featured Image
        name: featured_image
        widget: image
        required: false
      - label: Proof Card
        name: proof
        widget: object
        required: false
        collapsed: true
        summary: "{{issue}}"
        hint: Build proofs in the Proof Desk. This field remains here so article files can still carry the proof data shape.
        fields:
          - label: Issue
            name: issue
            widget: string
            required: false
            hint: Short charged proposition. State plainly what is being proved.
          - label: Axioms
            name: axioms
            widget: list
            required: false
            collapsed: true
            label_singular: Axiom
            summary: "{{fields.premise}}"
            fields:
              - label: Premise
                name: premise
                widget: string
                required: true
                hint: The undisputed, documented truth.
              - label: Sources
                name: sources
                widget: list
                required: false
                collapsed: true
                label_singular: Source
                summary: "{{fields.document_url}}"
                fields:
                  - label: Source URL
                    name: document_url
                    widget: relation
                    required: true
                    collection: source_documents
                    search_fields:
                      - title
                      - description
                      - source_method
                    value_field: "/documents/{{slug}}/"
                    display_fields:
                      - title
                    hint: Select the corresponding source document entry. Stored as /documents/.../
              - label: No Source Needed
                name: no_source_needed
                widget: boolean
                required: false
                default: false
                hint: Use only when the axiom should remain source-free in the published proof.
          - label: Inferences
            name: logic
            widget: list
            required: false
            collapsed: true
            label_singular: Inference
            summary: "{{fields.step}}"
            fields:
              - label: Inference
                name: step
                widget: string
                required: true
                hint: Plain-language inferential step. State what follows from the documented facts.
          - label: Bridge Note (Optional)
            name: inference
            widget: text
            required: false
            hint: Optional bridge note for the newsroom. Not currently displayed on published proofs.
          - label: Conclusion
            name: conclusion
            widget: text
            required: false
            hint: Fuller proved finding. More detailed and earned than the issue.
      - label: Body
        name: body
        widget: markdown
  - name: source_documents
    label: Source Documents
    label_singular: Source Document
    icon: folder_open
    description: Create a source entry first, then cite it from article Proof Card axioms.
    folder: src/content/documents
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    media_folder: static/documents
    public_folder: /documents
    summary: "{{title}} - {{obtained | date('DD MMM YYYY')}}"
    preview_path: "/documents/{{slug}}/"
    sortable_fields:
      - title
      - obtained
      - source_method
    fields:
      - label: Title
        name: title
        widget: string
      - label: File
        name: file
        widget: file
        accept: application/pdf,.pdf,image/*
        choose_url: false
      - label: Preview Image URL
        name: preview_image
        widget: string
        required: false
        hint: Optional thumbnail URL (PNG/WebP). If omitted, Eleventy checks src/_data/document-previews.json using the file path.
      - label: Social Card Image URL
        name: og_image
        widget: string
        required: false
        hint: Optional override for og:image / twitter:image on this document page.
      - label: Primary Source
        name: primary_source
        widget: boolean
        required: false
        default: true
        hint: Enable for official filings, court records, and government documents. Disable for illustrative exhibits.
      - label: Description
        name: description
        widget: text
        hint: What this document proves and why it matters.
      - label: Obtained
        name: obtained
        widget: datetime
        type: date
      - label: Source Method
        name: source_method
        widget: string
        hint: "How obtained: FOIA, public database, provided by source, etc."

  - name: podcast
    label: Podcast Episodes
    label_singular: Podcast Episode
    icon: mic
    description: Manage Democratic Justice podcast episodes and transcript metadata.
    folder: src/content/podcast
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    media_folder: static/media/podcast
    public_folder: /media/podcast
    summary: "{{title}} - {{publish_date | date('DD MMM YYYY')}}"
    preview_path: "/podcast/{{slug}}/"
    sortable_fields:
      - title
      - publish_date
      - guid
    fields:
      - label: Title
        name: title
        widget: string
      - label: Publish Date
        name: publish_date
        widget: datetime
      - label: Description
        name: description
        widget: markdown
      - label: Audio File
        name: audio_file
        widget: file
      - label: Audio File Size (bytes)
        name: file_size
        widget: number
        value_type: int
        min: 1
      - label: Duration (HH:MM:SS)
        name: duration
        widget: string
        pattern:
          - '^\\d{2}:\\d{2}:\\d{2}$'
          - Duration must use HH:MM:SS format.
      - label: Episode Artwork
        name: image
        widget: image
      - label: VTT Transcript
        name: transcript_file
        widget: file
      - label: GUID
        name: guid
        widget: string
      - label: Source Documents
        name: source_documents
        widget: relation
        collection: source_documents
        multiple: true
        search_fields:
          - title
          - description
        value_field: "{{slug}}"
        display_fields:
          - title
