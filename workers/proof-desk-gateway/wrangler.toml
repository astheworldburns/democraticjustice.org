name = "proof-desk-gateway"
main = "src/index.js"
compatibility_date = "2026-03-26"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[vars]
GITHUB_HOSTNAME = "github.com"
GITHUB_REPO_OWNER = "astheworldburns"
GITHUB_REPO_NAME = "democraticjustice.org"
GITHUB_BRANCH = "main"
ARTICLE_CONTENT_PATH = "src/content/articles/"
AUTHOR_CONTENT_PATH = "src/content/authors/"
DOCUMENT_CONTENT_PATH = "src/content/documents/"
DOCUMENT_ASSET_PATH = "static/documents/"
ALLOWED_ORIGINS = "https://democraticjustice.org,http://localhost:8080"
# Writer Desk secrets to set in Cloudflare:
# - GITHUB_SERVER_TOKEN
# Secret: INTERNAL_SECRET — shared with admin-gateway
# - EDITOR_BOOTSTRAP_EMAIL
# - EDITOR_BOOTSTRAP_PASSWORD
# Optional:
# - EDITOR_BOOTSTRAP_NAME = "Admin"
# Optional if you later move Content Desk auth to this same Worker:
# ALLOWED_DOMAINS = "democraticjustice.org,*.democraticjustice.org"
# Optional newsroom restrictions:
# GITHUB_ALLOWED_USERS = "sethsturm"
# GITHUB_ALLOWED_ORG = "your-github-org"

[[kv_namespaces]]
binding = "EDITOR_SESSIONS"
id = "9e5f8f021cb74009ba886642f92f7567"
